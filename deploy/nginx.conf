# Minimal reverse proxy for SSO Gateway API.
# Drop into /etc/nginx/conf.d/sso-gateway.conf and reload nginx.
# Assumes the gateway api listens on 127.0.0.1:8080 (host or docker
# port mapping 8080->8080).

# Rate limit zone for unauthenticated requests (login attempts, etc.).
# $binary_remote_addr is the client's IP; 10 MB ≈ 160k unique IPs.
limit_req_zone $binary_remote_addr zone=anon:10m rate=10r/s;

upstream sso_gateway_api {
    server 127.0.0.1:8080;
    keepalive 16;
}

# Redirect HTTP -> HTTPS. Comment out if you terminate TLS elsewhere.
server {
    listen 80;
    server_name gateway.example.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name gateway.example.com;

    ssl_certificate     /etc/letsencrypt/live/gateway.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/gateway.example.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers on;

    # Security headers — small surface, so be strict.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer" always;

    # Hide nginx version.
    server_tokens off;

    # Health and metrics: open. If you don't want metrics public, restrict
    # by IP via `allow 10.0.0.0/8; deny all;` here.
    location = /healthz {
        proxy_pass http://sso_gateway_api;
        access_log off;
    }
    location = /metrics {
        proxy_pass http://sso_gateway_api;
        # Restrict metrics to internal scrapers. Replace with your CIDR.
        allow 10.0.0.0/8;
        allow 127.0.0.1;
        deny all;
    }

    # API endpoints — gateway enforces X-API-Key auth. We just forward.
    location /api/ {
        proxy_pass http://sso_gateway_api;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
    }
}
