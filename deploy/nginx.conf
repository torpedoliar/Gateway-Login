# Minimal example reverse proxy for SSO Gateway API.
# Drop into /etc/nginx/conf.d/ or include from your main nginx.conf.
# Assumes gateway api listens on 127.0.0.1:8080 inside the host (or
# the docker network port mapping 8080->8080).

upstream sso_gateway_api {
    server 127.0.0.1:8080;
    keepalive 16;
}

server {
    listen 80;
    server_name gateway.example.com;

    # Health and metrics are exposed without auth.
    location /healthz {
        proxy_pass http://sso_gateway_api;
    }
    location /metrics {
        proxy_pass http://sso_gateway_api;
    }

    # API endpoints — require the caller to present an API key.
    location /api/ {
        proxy_pass http://sso_gateway_api;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }
}
