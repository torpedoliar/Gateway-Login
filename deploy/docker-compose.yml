version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: sso
      POSTGRES_PASSWORD: sso
      POSTGRES_DB: sso
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sso -d sso"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # Run once: `docker compose run --rm setup`
  setup:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.setup
    environment:
      POSTGRES_DSN: postgres://sso:sso@postgres:5432/sso?sslmode=disable
      REDIS_ADDR: redis:6379
    volumes:
      - gateway-config:/etc/gateway
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    stdin_open: true
    tty: true

  api:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.api
    environment:
      GATEWAY_HTTP_ADDR: ":8080"
      POSTGRES_DSN: postgres://sso:sso@postgres:5432/sso?sslmode=disable
      REDIS_ADDR: redis:6379
      GATEWAY_MASTER_KEY: ${GATEWAY_MASTER_KEY}
      API_RATE_LIMIT_PER_MIN: 300
      LOG_LEVEL: info
    volumes:
      - gateway-config:/etc/gateway:ro
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  sync:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.sync
    environment:
      POSTGRES_DSN: postgres://sso:sso@postgres:5432/sso?sslmode=disable
      REDIS_ADDR: redis:6379
      GATEWAY_MASTER_KEY: ${GATEWAY_MASTER_KEY}
      GATEWAY_CONFIG_PATH: /etc/gateway/config.yaml
      SYNC_INTERVAL: 5m
      SYNC_BATCH_SIZE: 500
      LOG_LEVEL: info
    volumes:
      - gateway-config:/etc/gateway:ro
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
  gateway-config:
